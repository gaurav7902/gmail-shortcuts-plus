<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Gmail Arrow Key Navigation</title>
    <style>
      :root {
        color-scheme: light;
      }

      body {
        margin: 0;
        min-width: 280px;
        font-family: "Google Sans", Roboto, Arial, sans-serif;
        background: #f8f9fa;
        color: #202124;
      }

      .panel {
        margin: 12px;
        padding: 14px;
        border: 1px solid #dadce0;
        border-radius: 12px;
        background: #ffffff;
        box-shadow: 0 2px 8px rgba(60, 64, 67, 0.15);
      }

      h1 {
        margin: 0 0 10px;
        font-size: 16px;
        line-height: 1.3;
      }

      #status {
        margin: 0 0 12px;
        font-size: 13px;
        color: #5f6368;
      }

      #toggle {
        width: 100%;
        border: 1px solid #dadce0;
        border-radius: 8px;
        padding: 9px 10px;
        font-size: 13px;
        font-weight: 600;
        background: #f1f3f4;
        color: #202124;
        cursor: pointer;
      }

      #toggle:focus-visible {
        outline: 2px solid #1a73e8;
        outline-offset: 1px;
      }

      #toggle:hover {
        background: #e8eaed;
      }

      #toggle:active {
        background: #dadce0;
      }

      .footer {
        margin-top: 16px;
        padding-top: 12px;
        border-top: 1px solid #dadce0;
        font-size: 12px;
        text-align: center;
        color: #80868b;
      }

      .footer a {
        color: #1a73e8;
        text-decoration: none;
        font-weight: 500;
      }

      .footer a:hover {
        text-decoration: underline;
      }
    </style>
  </head>
  <body>
    <main class="panel">
      <h1>Gmail Arrow Key Navigation</h1>
      <p id="status" aria-live="polite">Status: ...</p>
      <button id="toggle" type="button" aria-pressed="false">Toggle</button>
      <footer class="footer">
        <p><a href="https://github.com/gaurav7902/gmail-helper" target="_blank" rel="noopener noreferrer">Help or Contribute</a></p>
      </footer>
    </main>
    <script src="popup.js"></script>
  </body>
</html>
